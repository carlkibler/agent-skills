interface:
  display_name: "Decision Log"
  short_description: "Capture a technical or product decision with chosen option, rejected alternatives, and rationale — in a format a future agent can read to reconstruct context. Safe for repo-local and cloud/repo-checkout workflows."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#6366F1"
  default_prompt: "Log this decision: what we chose, what we rejected, and why. Save it in a format a future Claude session can read."
policy:
  allow_implicit_invocation: true
