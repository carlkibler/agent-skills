interface:
  display_name: "Changelog Writer"
  short_description: "Generate user-facing changelog entries from git history — plain language, audience-segmented, with optional CHANGELOG.md update. Best in local Codex CLI/app sessions on your own machine."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#8B5CF6"
  default_prompt: "Write a user-facing changelog for the changes since the last release. Segment by audience: users, developers, operators. Plain language only — no commit hashes or internal jargon."
policy:
  allow_implicit_invocation: false
