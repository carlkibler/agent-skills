interface:
  display_name: "Dependency Pinning"
  short_description: "Dependency safety scan. Audit one or many projects/repos for SHA/digest pinning and release cooldowns across Docker, GitHub Actions, npm/pnpm/yarn/bun/deno, Python (uv/pdm/poetry/pip), .NET (NuGet), and Terraform. Report violations, then apply fixes and add cooldowns only with the user's OK. Triggers on 'dependency pinning', 'pin deps', 'supply chain', 'cooldown', 'are my deps safe'. Safe for repo-local and cloud/repo-checkout workflows."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#15803D"
  default_prompt: "Scan this project (or the repos I point you at) for dependency pinning and release-cooldown hygiene across Docker, CI, JS, Python, and Terraform. Report first; propose exact fixes and ask before changing anything."
policy:
  allow_implicit_invocation: true
