interface:
  display_name: "Release Operator"
  short_description: "Run a CLI/app release end-to-end: verify state, update changelog/version, test packaging, commit, tag, push, publish, and verify installs. Best in local Codex CLI/app sessions on your own machine."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#059669"
  default_prompt: "Run the release end-to-end. Verify tests and package contents, update changelog/version, commit/tag/push, publish, then verify install/update locally and on any named remote hosts."
policy:
  allow_implicit_invocation: false
