interface:
  display_name: "Empathy Audit"
  short_description: "Review code through four empathy lenses — user, machine, developer, support — to surface quality issues that pure technical review misses. Finds what makes users uninstall, machines overheat, developers quit, and support people burn out. Safe for repo-local and cloud/repo-checkout workflows."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#7C3AED"
  default_prompt: "Run an empathy audit on this code or feature through user, machine, developer, and support lenses."
policy:
  allow_implicit_invocation: true
