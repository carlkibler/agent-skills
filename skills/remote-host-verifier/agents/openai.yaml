interface:
  display_name: "Remote Host Verifier"
  short_description: "Verify commands across this machine and named SSH hosts, comparing versions, install paths, config, and behavior with clean local/remote evidence. Best in local Codex CLI/app sessions on your own machine."
  icon_small: "./assets/icon.svg"
  icon_large: "./assets/icon.svg"
  brand_color: "#0369A1"
  default_prompt: "Verify this command locally and on the named remote host(s). Capture versions, paths, output differences, and a final pass/fail verdict with exact commands."
policy:
  allow_implicit_invocation: false
